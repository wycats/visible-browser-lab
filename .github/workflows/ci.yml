name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    outputs:
      required: ${{ steps.filter.outputs.required }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          # Pushes to main and non-PR events always run the full validation.
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Documentation-only changes do not affect build or test outcomes.
          # Skill files are packaged into release archives, so skills/ stays required.
          required=false
          while IFS= read -r file; do
            case "$file" in
              docs/*) continue ;;
              *.md)
                case "$file" in
                  skills/*) required=true; break ;;
                  *) continue ;;
                esac
                ;;
              *) required=true; break ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD)
          echo "required=$required" >> "$GITHUB_OUTPUT"

  tests:
    name: Tests
    needs: changes
    if: needs.changes.outputs.required == 'true'
    uses: ./.github/workflows/tests.yml

  # Branch protection requires this single context. It reports success when
  # the tests passed, or when the classifier decided no tests were needed.
  conclusion:
    name: CI complete
    needs:
      - changes
      - tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required results
        shell: bash
        run: |
          set -euo pipefail
          changes='${{ needs.changes.result }}'
          required='${{ needs.changes.outputs.required }}'
          tests='${{ needs.tests.result }}'
          if [[ "$changes" != "success" ]]; then
            echo "Classifier result: $changes" >&2
            exit 1
          fi
          if [[ "$required" == "true" && "$tests" != "success" ]]; then
            echo "Tests result: $tests" >&2
            exit 1
          fi
          if [[ "$required" != "true" && "$tests" != "skipped" && "$tests" != "success" ]]; then
            echo "Tests result: $tests" >&2
            exit 1
          fi
          echo "CI requirements satisfied"
