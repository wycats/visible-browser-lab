name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Test workspace unit layers
        run: cargo test --workspace --lib --bins

      - name: Validate release inputs
        run: cargo xtask validate

  real-browser:
    name: Real-browser MCP tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Chrome for Testing
        uses: actions/cache@v6
        with:
          path: target/chrome-for-testing
          key: chrome-for-testing-${{ runner.os }}-${{ runner.arch }}

      - name: Test real-browser MCP facade
        env:
          VISIBLE_BROWSER_LAB_CFT_CACHE_DIR: target/chrome-for-testing
        run: cargo test --test headless_mcp
