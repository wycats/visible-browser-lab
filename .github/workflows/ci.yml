name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    outputs:
      required: ${{ steps.filter.outputs.required }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          # Pushes to main and non-PR events always run the full validation.
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Documentation-only changes do not affect build or test outcomes.
          # Skill files are packaged into release archives, so skills/ stays required.
          required=false
          while IFS= read -r file; do
            case "$file" in
              docs/*) continue ;;
              *.md)
                case "$file" in
                  skills/*) required=true; break ;;
                  *) continue ;;
                esac
                ;;
              *) required=true; break ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD)
          echo "required=$required" >> "$GITHUB_OUTPUT"

  tests:
    name: Tests
    needs: changes
    if: needs.changes.outputs.required == 'true'
    uses: ./.github/workflows/tests.yml
