name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    outputs:
      required: ${{ steps.filter.outputs.required }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          # Pushes to main and non-PR events always run the full validation.
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Documentation-only changes do not affect build or test outcomes.
          # Skill files are packaged into release archives, so skills/ stays required.
          required=false
          while IFS= read -r file; do
            case "$file" in
              docs/*) continue ;;
              *.md)
                case "$file" in
                  skills/*) required=true; break ;;
                  *) continue ;;
                esac
                ;;
              *) required=true; break ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD)
          echo "required=$required" >> "$GITHUB_OUTPUT"

  rust:
    name: Rust (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.required == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Test workspace unit layers
        run: cargo test --workspace --lib --bins

      - name: Validate release inputs
        run: cargo xtask validate

  real-browser:
    name: Real-browser MCP tests (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.required == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Chrome for Testing
        uses: actions/cache@v6
        with:
          path: target/chrome-for-testing
          key: chrome-for-testing-${{ runner.os }}-${{ runner.arch }}

      - name: Test real-browser MCP facade
        env:
          VISIBLE_BROWSER_LAB_CFT_CACHE_DIR: target/chrome-for-testing
        run: cargo test --test headless_mcp
