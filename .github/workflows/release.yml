name: Release

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build, package, checksum, and attest assets without publishing a GitHub Release.
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CODEX_CLI_VERSION: "0.136.0"

jobs:
  # A pull request dry-run already built, packaged, smoked, and attested the
  # exact assets a release needs. When the tagged commit's tree matches a
  # successful dry-run's tree (the normal squash-merge case), the release
  # republishes those assets instead of rebuilding them.
  reuse:
    name: Find reusable dry-run assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      run_id: ${{ steps.find.outputs.run_id }}
    steps:
      - name: Find dry-run with matching tree
        id: find
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The lookup is an optimization. Any failure inside find_reuse (API
          # blip, rate limit, missing object) yields an empty run_id and the
          # full pipeline runs instead of the release being blocked.
          find_reuse() {
            local sha tag_tree id head_sha tree count ci_runs
            # Annotated tag pushes deliver the tag object's SHA; peel it to
            # the tagged commit before reading the tree.
            sha="${GITHUB_SHA}"
            if ! tag_tree=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${sha}" -q '.tree.sha' 2>/dev/null); then
              sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${sha}" -q '.object.sha') || return 0
              tag_tree=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${sha}" -q '.tree.sha') || return 0
            fi
            while IFS=$'\t' read -r id head_sha; do
              # Dry-run jobs check out the PR head, so the head commit's tree
              # is the tree the artifacts were actually built from.
              tree=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${head_sha}" -q '.tree.sha' 2>/dev/null) || continue
              [[ "$tree" == "$tag_tree" ]] || continue
              # The artifact must still exist; dry-run artifacts expire.
              count=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${id}/artifacts" \
                -q '[.artifacts[] | select(.name == "release-assets" and .expired == false)] | length' 2>/dev/null) || continue
              [[ "$count" == "1" ]] || continue
              # Dry-runs skip the test suite on pull requests because the CI
              # workflow runs it on the same commit. Reuse is only safe when
              # that CI run actually succeeded.
              ci_runs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${head_sha}&status=success&per_page=1" \
                -q '.workflow_runs | length' 2>/dev/null) || continue
              [[ "$ci_runs" -ge 1 ]] || continue
              echo "$id"
              return 0
            done < <(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?event=pull_request&status=success&per_page=25" \
              -q '.workflow_runs[] | [.id, .head_sha] | @tsv' 2>/dev/null)
            return 0
          }
          run_id=$(find_reuse || true)
          if [[ -n "$run_id" ]]; then
            echo "Found dry-run ${run_id} with tree matching the tagged commit"
          else
            echo "No reusable dry-run for this tree; running the full pipeline"
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    outputs:
      required: ${{ steps.filter.outputs.required }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          # Tag pushes and manual dispatches always run the full release path.
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Documentation-only changes do not affect release artifacts.
          # Skill files are packaged into release archives, so skills/ stays required.
          required=false
          while IFS= read -r file; do
            case "$file" in
              docs/*) continue ;;
              *.md)
                case "$file" in
                  skills/*) required=true; break ;;
                  *) continue ;;
                esac
                ;;
              *) required=true; break ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD)
          echo "required=$required" >> "$GITHUB_OUTPUT"

  release-version:
    name: Resolve release version
    needs:
      - changes
      - reuse
    if: needs.changes.outputs.required == 'true' && needs.reuse.outputs.run_id == ''
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      # Dry-runs build the PR head rather than the synthetic merge ref, so
      # the artifacts' tree is exactly the head tree the reuse job matches
      # against tags, and the package manifest's source_commit records a
      # permanent commit instead of an ephemeral merge ref.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "visible-browser-lab") | .version')"
          fi
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "Unable to resolve release version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # Pull requests run these same tests through the CI workflow on the same
  # commit, so the dry-run only repeats them for tag pushes and manual runs.
  tests:
    name: Tests
    needs:
      - changes
      - reuse
    if: >-
      needs.changes.outputs.required == 'true' &&
      github.event_name != 'pull_request' &&
      needs.reuse.outputs.run_id == ''
    uses: ./.github/workflows/tests.yml

  build:
    name: Build ${{ matrix.target }}
    needs:
      - changes
      - tests
      - release-version
      - reuse
    # Tests are skipped on pull requests because CI runs them on the same
    # commit; the build proceeds as long as no needed job failed.
    if: >-
      !cancelled() &&
      needs.changes.outputs.required == 'true' &&
      needs.reuse.outputs.run_id == '' &&
      needs.release-version.result == 'success' &&
      (needs.tests.result == 'success' || needs.tests.result == 'skipped')
    runs-on: ${{ matrix.os }}
    env:
      VISIBLE_BROWSER_LAB_RELEASE_VERSION: ${{ needs.release-version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm

    steps:
      # PR head, not the synthetic merge ref; see the release-version job.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}

      # The staged binary is fully determined by the runtime crates, the
      # workspace lockfile, and the release version. Packaging-only changes
      # reuse the cached binary instead of rebuilding the whole matrix.
      - name: Restore cached release binary
        id: binary-cache
        uses: actions/cache@v6
        with:
          path: dist/binaries/${{ matrix.target }}
          key: release-binary-${{ matrix.target }}-${{ needs.release-version.outputs.version }}-${{ hashFiles('src/**', 'agent-surface-contract/**', 'Cargo.toml', 'Cargo.lock') }}

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Rust target
        if: steps.binary-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rustup target add "${{ matrix.target }}"

      - name: Install musl tools
        if: steps.binary-cache.outputs.cache-hit != 'true' && contains(matrix.target, 'unknown-linux-musl')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: cargo build --release --target "${{ matrix.target }}" --bin visible-browser-lab-mcp

      - name: Stage binary artifact
        if: steps.binary-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          binary="visible-browser-lab-mcp"
          if [[ "$target" == *windows* ]]; then
            binary="${binary}.exe"
          fi
          mkdir -p "dist/binaries/${target}"
          cp "target/${target}/release/${binary}" "dist/binaries/${target}/${binary}"

      - name: Verify binary version
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          binary="visible-browser-lab-mcp"
          if [[ "$target" == *windows* ]]; then
            binary="${binary}.exe"
          fi
          actual="$("dist/binaries/${target}/${binary}" --version)"
          expected="visible-browser-lab-mcp ${VISIBLE_BROWSER_LAB_RELEASE_VERSION}"
          if [[ "$actual" != "$expected" ]]; then
            echo "Binary version mismatch: expected '$expected', got '$actual'" >&2
            exit 1
          fi

      - name: Cache Chrome for Testing
        uses: actions/cache@v6
        with:
          path: target/chrome-for-testing
          key: chrome-for-testing-${{ runner.os }}-${{ runner.arch }}

      - name: Validate packaged durable screencast
        shell: bash
        env:
          VISIBLE_BROWSER_LAB_CFT_CACHE_DIR: target/chrome-for-testing
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          binary="visible-browser-lab-mcp"
          if [[ "$target" == *windows* ]]; then
            binary="${binary}.exe"
          fi
          cargo xtask screencast-smoke \
            --binary "dist/binaries/${target}/${binary}" \
            --duration-ms 45000

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: dist/binaries/${{ matrix.target }}/*
          if-no-files-found: error

  package:
    name: Package release assets
    needs:
      - build
      - release-version
    # The default success() condition follows the transitive needs chain, and
    # tests is intentionally skipped on pull requests. Package whenever the
    # direct dependencies succeeded.
    if: >-
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.release-version.result == 'success'
    runs-on: ubuntu-latest
    env:
      VISIBLE_BROWSER_LAB_RELEASE_VERSION: ${{ needs.release-version.outputs.version }}
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      # PR head, not the synthetic merge ref; see the release-version job.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Chrome for Testing
        uses: actions/cache@v6
        with:
          path: target/chrome-for-testing
          key: chrome-for-testing-${{ runner.os }}-${{ runner.arch }}

      - name: Install visible browser dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openbox xvfb

      - name: Download trusted Codex CLI package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/codex
          asset="codex-package-x86_64-unknown-linux-musl.tar.gz"
          gh release download "rust-v${CODEX_CLI_VERSION}" \
            --repo openai/codex \
            --pattern "$asset" \
            --pattern codex-package_SHA256SUMS \
            --dir dist/codex
          (
            cd dist/codex
            grep "  ${asset}$" codex-package_SHA256SUMS | sha256sum --check -
            tar -xzf "$asset"
          )
          dist/codex/bin/codex --version

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/binaries

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Build extension host bundle
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm --filter visible-browser-lab build

      - name: Build package archives
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            aarch64-apple-darwin
            x86_64-apple-darwin
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl
            x86_64-pc-windows-msvc
            aarch64-pc-windows-msvc
          )

          for target in "${targets[@]}"; do
            binary="visible-browser-lab-mcp"
            if [[ "$target" == *windows* ]]; then
              binary="${binary}.exe"
            fi
            cargo xtask package \
              --target "$target" \
              --binary "dist/binaries/binary-${target}/${binary}" \
              --version "$VISIBLE_BROWSER_LAB_RELEASE_VERSION"
          done

          cargo xtask checksums
          cargo xtask validate

      - name: Verify packaged VS Code extension
        shell: bash
        run: |
          set -euo pipefail
          xvfb-run -a -s "-screen 0 1280x1024x24" \
            cargo xtask vsix-smoke --extension-host \
            --archive "out/packages/visible-browser-lab-vscode-${VISIBLE_BROWSER_LAB_RELEASE_VERSION}-x86_64-unknown-linux-musl.vsix"

      - name: Verify installed Codex package
        shell: bash
        run: |
          set -euo pipefail
          xvfb-run -a -s "-screen 0 1280x1024x24" bash -c '
            set -euo pipefail
            openbox --sm-disable >"$RUNNER_TEMP/openbox.log" 2>&1 &
            openbox_pid=$!
            trap "kill $openbox_pid 2>/dev/null || true" EXIT
            archive="out/packages/visible-browser-lab-codex-${VISIBLE_BROWSER_LAB_RELEASE_VERSION}-x86_64-unknown-linux-musl.zip"
            cargo xtask install-smoke \
              --archive "$archive" \
              --codex dist/codex/bin/codex
          '

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: out/packages/*
          if-no-files-found: error

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: out/packages/*

  # Branch protection requires this single context. It reports success when
  # the dry-run pipeline completed, or when the classifier decided the change
  # does not affect release artifacts.
  conclusion:
    name: Release dry-run complete
    needs:
      - changes
      - tests
      - build
      - package
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required results
        shell: bash
        run: |
          set -euo pipefail
          changes='${{ needs.changes.result }}'
          required='${{ needs.changes.outputs.required }}'
          build='${{ needs.build.result }}'
          package='${{ needs.package.result }}'
          if [[ "$changes" != "success" ]]; then
            echo "Classifier result: $changes" >&2
            exit 1
          fi
          if [[ "$required" != "true" ]]; then
            echo "Release dry-run not required for this change"
            exit 0
          fi
          if [[ "$build" != "success" || "$package" != "success" ]]; then
            echo "Build result: $build; package result: $package" >&2
            exit 1
          fi
          echo "Release dry-run requirements satisfied"

  publish:
    name: Publish GitHub Release
    needs:
      - reuse
      - package
    runs-on: ubuntu-latest
    # Publishes either the assets packaged in this run or the assets from a
    # matching pull-request dry-run. The dry-run's attestations remain valid
    # because they are keyed by asset digest and the bytes are unchanged.
    if: >-
      !cancelled() &&
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') &&
      (needs.reuse.outputs.run_id != '' || needs.package.result == 'success')
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download release assets
        if: needs.reuse.outputs.run_id == ''
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: out/packages

      - name: Download reused dry-run assets
        if: needs.reuse.outputs.run_id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p out/packages
          gh run download "${{ needs.reuse.outputs.run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name release-assets \
            --dir out/packages

      - name: Verify reused dry-run assets
        if: needs.reuse.outputs.run_id != ''
        shell: bash
        run: |
          set -euo pipefail
          cd out/packages
          sha256sum --check SHA256SUMS
          version="${GITHUB_REF_NAME#v}"
          # Every packaged asset is named
          # visible-browser-lab-<host>-<version>-<target>.<ext>. Parsing the
          # name and comparing the version segment for equality rejects both
          # prefix tags (v0.4 against 0.4.4 assets) and pre-release drift
          # (v1.2.3 against 1.2.3-rc.1 assets).
          pattern='^visible-browser-lab-(claude-code|codex|mcp|vscode)-(.+)-(aarch64|x86_64)-(apple-darwin|pc-windows-msvc|unknown-linux-musl)\.(zip|vsix)$'
          for file in *; do
            [[ "$file" == "SHA256SUMS" ]] && continue
            if [[ ! "$file" =~ $pattern ]] || [[ "${BASH_REMATCH[2]}" != "$version" ]]; then
              echo "Asset '$file' does not match release version ${version}" >&2
              exit 1
            fi
          done

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" out/packages/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Trusted binary release for visible-browser-lab."
