name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Check TOML formatting
        run: cargo xtask fmt --check

      - name: Lint with Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace unit layers
        run: cargo test --workspace --lib --bins

      - name: Assert no leaked brokers
        run: cargo xtask broker-survivors

      - name: Validate release inputs
        run: cargo xtask validate

  real-browser:
    name: Real-browser MCP tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Chrome for Testing
        if: runner.os != 'Windows'
        uses: actions/cache@v6
        with:
          path: target/chrome-for-testing
          key: chrome-for-testing-${{ runner.os }}-${{ runner.arch }}

      - name: Select installed Chrome for Windows browser tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $chrome = Join-Path $Env:ProgramFiles 'Google\Chrome\Application\chrome.exe'
          if (-not (Test-Path $chrome)) {
            throw "Windows runner Chrome was not found at $chrome"
          }
          "VISIBLE_BROWSER_LAB_TEST_CHROME_PATH=$chrome" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Test real-browser MCP facade
        env:
          VISIBLE_BROWSER_LAB_CFT_CACHE_DIR: target/chrome-for-testing
        run: cargo test --test headless_mcp

      - name: Assert no leaked brokers
        run: cargo xtask broker-survivors
